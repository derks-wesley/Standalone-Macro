name: Release Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (bijv. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          $pyiArgs = @(
            "--noconfirm",
            "--clean",
            "--windowed",
            "--onefile",
            "--name", "StandaloneMacro",
            "--version-file", "windows/version_info.txt",
            "macro_app.py"
          )
          if (Test-Path "assets/app.ico") {
            $pyiArgs = @("--icon", "assets/app.ico") + $pyiArgs
          }
          & pyinstaller @pyiArgs

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ github.event.inputs.version }} /DMyAppPublisher="Standalone Macro" /DMyAppURL=https://github.com/ installer/StandaloneMacro.iss

      - name: Zip portable EXE
        shell: pwsh
        run: |
          Compress-Archive -Path dist/StandaloneMacro.exe -DestinationPath dist/StandaloneMacro-portable.zip -Force

      - name: Create Git tag
        shell: pwsh
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}

      - name: Create GitHub Release with installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Standalone Macro ${{ github.event.inputs.version }}
          body: |
            Kant-en-klare Windows installer en portable EXE.
          files: |
            installer/output/StandaloneMacroSetup.exe
            dist/StandaloneMacro.exe
            dist/StandaloneMacro-portable.zip
